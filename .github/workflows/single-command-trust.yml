name: Single Command Trust

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  single-command-trust:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 22
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run test suite
        run: npm test

      - name: Run single-command trust smoke
        run: npm run smoke:p0
