{
  "project": {
    "name": "PHP Laravel Repository",
    "summary": "Laravel-oriented repository with synchronized AI agent instructions.",
    "components": [
      "backend: Laravel application using PHP 8.3 and Composer",
      "frontend: optional asset pipeline or admin UI if present"
    ]
  },
  "workspaceInstructions": {
    "packageManagerRule": "Use `composer` for PHP dependencies. Use `npm` only if the repository already contains frontend tooling that depends on it.",
    "runtimeRule": "Use PHP 8.3 locally and in production. Keep Composer and framework versions aligned with the project's supported matrix.",
    "sections": [
      {
        "title": "General rules",
        "rules": [
          "Prefer small, reviewable changes that preserve current behavior unless a feature or bug fix requires a contract change.",
          "Keep code compatible with the repository's supported PHP and Laravel versions.",
          "Preserve accessibility, validation, auth boundaries, and environment-driven configuration.",
          "Favor dependency injection, explicit services, DTOs, policies, and form requests over controller-heavy logic.",
          "Avoid avoidable query waterfalls, repeated database work, and hidden side effects in model accessors or global scopes."
        ]
      },
      {
        "title": "Laravel rules",
        "rules": [
          "Keep controllers thin and move business logic into dedicated services, actions, jobs, or domain classes.",
          "Use request validation, policies, gates, and middleware consistently rather than ad hoc authorization checks in views.",
          "Prefer eager loading, query scopes, and explicit repository or service boundaries when data access becomes non-trivial.",
          "Keep secrets in environment variables and never expose private credentials or tokens to the frontend.",
          "Preserve queue, cache, event, notification, and API response contracts unless the task explicitly changes them."
        ]
      },
      {
        "title": "Testing rules",
        "rules": [
          "Prefer Pest or PHPUnit feature tests for HTTP behavior and focused unit tests for domain logic.",
          "When changing validation, policies, serialization, or database writes, add or update tests that cover the contract.",
          "Use factories and seed data intentionally; keep fixtures minimal and deterministic."
        ]
      }
    ],
    "validation": [
      "Run `composer test` if the repository provides it.",
      "Run `php artisan test` or the repository's equivalent test command.",
      "Run static analysis and formatting commands such as `./vendor/bin/phpstan` and `./vendor/bin/pint` when available."
    ]
  },
  "reviewChecklist": {
    "intro": "Checklist for verifying whether a PHP or Laravel-oriented proposal really follows the repository rules instead of generic framework advice.",
    "failureThreshold": 2,
    "items": [
      {
        "title": "Reflects the real PHP and Laravel runtime constraints.",
        "details": [
          "The answer should use the real PHP version, Composer workflow, and framework conventions of the repository."
        ]
      },
      {
        "title": "Keeps Laravel transport, domain, and data-access concerns separated.",
        "details": [
          "Controllers, requests, policies, actions, services, and queries should remain coherent with the project's existing architecture."
        ]
      },
      {
        "title": "Preserves validation, auth, serialization, and operational contracts.",
        "details": [
          "API payloads, policies, events, queues, cache usage, and migrations should not drift unintentionally."
        ]
      },
      {
        "title": "Uses explicit validation and testing.",
        "details": [
          "Changes that affect HTTP behavior, database writes, auth, or serialization should usually add or update tests."
        ]
      }
    ],
    "quickSignals": [
      "Thin controllers and explicit services or actions.",
      "Form requests, policies, or middleware instead of scattered checks.",
      "Validation commands mention tests, static analysis, and formatting."
    ],
    "redFlags": [
      "Business logic embedded in controllers or views.",
      "Unbounded Eloquent queries or lazy relation access inside loops.",
      "Hardcoded secrets, deploy-specific values, or silent contract changes."
    ]
  },
