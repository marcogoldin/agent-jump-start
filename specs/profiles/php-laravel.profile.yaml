      "rules": [
        {
          "id": "language-strict-types",
          "category": "Language Rules",
          "title": "Use strict types and explicit signatures",
          "impact": "HIGH",
          "summary": "Default to strict typing, typed properties, and explicit parameter and return types.",
          "guidance": [
            "Use value objects or DTOs when array shapes become non-trivial.",
            "Avoid mixed data structures unless the framework contract forces them."
          ]
        },
        {
          "id": "language-small-methods",
          "category": "Language Rules",
          "title": "Keep methods cohesive",
          "impact": "HIGH",
          "summary": "Prefer short, single-purpose methods over large procedural classes.",
          "guidance": [
            "Extract private helpers or dedicated services when branching grows.",
            "Name methods by behavior rather than by implementation detail."
          ]
        },
        {
          "id": "architecture-explicit-dependencies",
          "category": "Architecture Rules",
          "title": "Use constructor injection for real dependencies",
          "impact": "HIGH",
          "summary": "Make dependencies explicit through the container rather than hidden static helpers.",
          "guidance": [
            "Prefer injected collaborators over service locator lookups in deep business logic.",
            "Keep framework facades at the edge when possible."
          ]
        },
        {
          "id": "architecture-domain-boundaries",
          "category": "Architecture Rules",
          "title": "Separate transport concerns from domain concerns",
          "impact": "HIGH",
          "summary": "Move request parsing, serialization, and side effects out of core domain services.",
          "guidance": [
            "Controllers should orchestrate rather than own business rules.",
            "Use DTOs, actions, or command objects when a flow has multiple steps."
          ]
        },
        {
          "id": "safety-no-silent-failures",
          "category": "Safety Rules",
          "title": "Fail explicitly on invalid state",
          "impact": "MEDIUM",
          "summary": "Do not hide invalid inputs or impossible states behind silent fallbacks.",
          "guidance": [
            "Throw domain exceptions or return explicit error objects where the codebase expects them.",
            "Add focused tests when changing failure behavior."
          ]
        }
      ]
    },
