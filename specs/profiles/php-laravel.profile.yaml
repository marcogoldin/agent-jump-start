      "rules": [
        {
          "id": "http-form-requests",
          "category": "HTTP and Validation",
          "title": "Centralize validation and authorization",
          "impact": "HIGH",
          "summary": "Use form requests, policies, gates, and middleware instead of scattering checks across controllers and views.",
          "guidance": [
            "Keep validation messages and rules close to the transport layer.",
            "Prefer policy methods for resource-level authorization."
          ]
        },
        {
          "id": "http-api-contracts",
          "category": "HTTP and Validation",
          "title": "Preserve API contracts intentionally",
          "impact": "HIGH",
          "summary": "Do not change payload shape, status codes, or resource serialization casually.",
          "guidance": [
            "Call out breaking changes explicitly in review notes and documentation.",
            "Cover serialization changes with feature tests."
          ]
        },
        {
          "id": "data-eager-loading",
          "category": "Data Access",
          "title": "Prevent avoidable N+1 queries",
          "impact": "HIGH",
          "summary": "Use eager loading and query shaping when related data is known up front.",
          "guidance": [
            "Measure hot paths before adding abstraction purely for style.",
            "Avoid lazy relation access in loops."
          ]
        },
        {
          "id": "data-query-boundaries",
          "category": "Data Access",
          "title": "Keep queries predictable",
          "impact": "HIGH",
          "summary": "Hide non-trivial query composition behind scopes, repositories, or dedicated query services.",
          "guidance": [
            "Keep controller query code short and explicit.",
            "Avoid mixing pagination, filtering, and serialization logic in the same method."
          ]
        },
        {
          "id": "ops-env-config",
          "category": "Operations",
          "title": "Prefer environment-driven runtime configuration",
          "impact": "MEDIUM",
          "summary": "Keep secrets and deploy-specific values in environment or config files, not hardcoded in classes.",
          "guidance": [
            "Do not expose private credentials to browser code.",
            "Preserve queue, cache, and notification contracts unless the task requires a deliberate change."
          ]
        }
      ]
    }
