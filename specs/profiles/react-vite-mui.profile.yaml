      "rules": [
        {
          "id": "async-parallel",
          "category": "Async and Data Flow",
          "title": "Start independent async work early",
          "impact": "HIGH",
          "summary": "Avoid avoidable waterfalls by starting independent promises before awaiting them.",
          "guidance": [
            "Use `Promise.all` for independent work.",
            "If a dependency chain exists, still start the earliest possible work immediately."
          ]
        },
        {
          "id": "rerender-derived-state",
          "category": "Re-render Control",
          "title": "Derive state during render",
          "impact": "HIGH",
          "summary": "Do not move simple derived state into effects or unnecessary memoization.",
          "guidance": [
            "Reserve effects for synchronization with the outside world.",
            "Keep primitive expressions inline unless there is a proven performance reason."
          ]
        },
        {
          "id": "rerender-no-inline-components",
          "category": "Re-render Control",
          "title": "Do not define components inside components by default",
          "impact": "HIGH",
          "summary": "Keep component identity stable and logic easier to review by extracting nested component definitions.",
          "guidance": [
            "Use separate components or helper render functions when it keeps state boundaries clear.",
            "Make exceptions only when locality clearly beats reuse and performance concerns."
          ]
        },
        {
          "id": "bundle-direct-imports",
          "category": "Bundle Control",
          "title": "Avoid unnecessary barrel imports",
          "impact": "MEDIUM",
          "summary": "Import directly from the module that owns the code when barrels increase bundle cost or blur ownership.",
          "guidance": [
            "Lazy-load heavy routes or components when the repository already uses code splitting.",
            "Be explicit about any new dependency that affects bundle size."
          ]
        }
      ]
    },
