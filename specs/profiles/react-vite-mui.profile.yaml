  "workspaceInstructions": {
    "packageManagerRule": "Use the package manager already adopted by the repository and do not introduce alternatives without an explicit decision.",
    "runtimeRule": "Keep local development and production aligned on the repository's supported Node and browser targets.",
    "sections": [
      {
        "title": "General rules",
        "rules": [
          "Prefer small, reviewable changes that preserve current behavior unless the task explicitly changes a feature or contract.",
          "Preserve accessibility, responsive behavior, and SSR-safe browser API usage.",
          "Avoid avoidable request waterfalls and parallelize independent async work.",
          "Prefer composition over boolean-prop proliferation in React components.",
          "Keep bundle size under control and avoid unnecessary barrel imports or heavy dependencies."
        ]
      },
      {
        "title": "React rules",
        "rules": [
          "Derive state during render when possible and avoid using effects for simple derived state.",
          "Avoid defining components inside other components unless there is a clear reason.",
          "Use `startTransition`, `useDeferredValue`, or refs for non-urgent or transient UI state when appropriate.",
          "Prefer composition, explicit variants, and context-based patterns over boolean mode props.",
          "Move interaction logic into event handlers when an effect is not required for synchronization."
        ]
      },
      {
        "title": "MUI rules",
        "rules": [
          "Use theme tokens first: palette, spacing, typography, breakpoints, and component variants.",
          "Prefer semantic MUI primitives and accessible labels over custom div-heavy layouts.",
          "Avoid repeated magic colors, spacing values, and z-index numbers."
        ]
      }
    ],
    "validation": [
      "Run the repository's lint command.",
      "Run the repository's build command.",
      "Run relevant test commands when the repository provides them."
    ]
  },
  "reviewChecklist": {
    "intro": "Checklist for verifying whether a React-oriented proposal really follows the repository rules instead of generic frontend advice.",
    "failureThreshold": 2,
    "items": [
      {
        "title": "Reflects the real frontend stack and runtime constraints.",
        "details": [
          "The answer should reference the actual runtime, package manager, framework, component library, and validation commands."
        ]
      },
      {
        "title": "Uses React patterns that preserve clarity and rendering performance.",
        "details": [
          "The proposal should avoid unnecessary effects, avoidable inline component definitions, and boolean-prop proliferation."
        ]
      },
      {
        "title": "Uses design-system primitives before ad hoc styling.",
        "details": [
          "The solution should favor theme tokens, semantic primitives, and reusable patterns over magic values and repeated one-off styles."
        ]
      },
      {
        "title": "Avoids unnecessary data and bundle cost.",
        "details": [
          "The change should not introduce avoidable waterfalls, heavy dependencies, or careless import patterns."
        ]
      }
    ],
    "quickSignals": [
      "Derived state stays in render when possible.",
      "Composition is preferred over mode flags.",
      "Validation commands mention lint, build, and tests when present."
    ],
    "redFlags": [
      "Effects used for simple derived state.",
      "Large components with many boolean mode props.",
      "Repeated inline styles, magic colors, or unnecessary barrel imports."
    ]
  },
