      }
    ],
    "quickSignals": [
      "RAII and smart pointers instead of manual new/delete.",
      "Const-correct function signatures.",
      "Sanitizer-clean CI builds.",
      "Minimal header includes with forward declarations."
    ],
    "redFlags": [
      "Raw owning pointers without clear lifetime documentation.",
      "Suppressed warnings or disabled sanitizers without justification.",
      "Platform-specific code without #ifdef guards or abstraction layers.",
