      "rules": [
        {
          "id": "own-smart-pointers",
          "category": "Ownership",
          "title": "Use smart pointers for heap ownership",
          "impact": "HIGH",
          "summary": "Default to std::unique_ptr for exclusive ownership and std::shared_ptr only when shared ownership is genuinely required.",
          "guidance": [
            "Use std::make_unique and std::make_shared to avoid allocation-exception leaks.",
            "Pass raw pointers or references for non-owning access. Never transfer ownership via raw pointer.",
            "Prefer value semantics and stack allocation when object lifetime is scoped."
          ]
        },
        {
          "id": "own-raii",
          "category": "Ownership",
          "title": "Use RAII for all resource types",
          "impact": "HIGH",
          "summary": "Wrap file handles, sockets, locks, GPU resources, and allocations in RAII wrappers so cleanup is deterministic.",
          "guidance": [
            "Implement or use existing RAII wrappers instead of try/catch cleanup blocks.",
            "Follow the Rule of Five (or Rule of Zero) for classes that manage resources.",
            "Ensure move constructors and move assignment operators leave the source in a valid state."
          ]
        },
        {
          "id": "life-dangling-refs",
          "category": "Lifetime Safety",
          "title": "Prevent dangling references and pointers",
          "impact": "HIGH",
          "summary": "Never return references or pointers to local variables, temporary objects, or invalidated container elements.",
          "guidance": [
            "Be aware of iterator and reference invalidation rules for std::vector, std::string, and other containers.",
            "Use std::string_view and std::span carefully — they do not own the underlying data.",
            "Prefer returning by value; rely on copy elision and move semantics."
          ]
        },
        {
          "id": "life-bounds-checking",
          "category": "Lifetime Safety",
          "title": "Bounds-check buffer and array access",
          "impact": "HIGH",
          "summary": "Use std::array, std::vector, std::span, or range-based for loops instead of raw pointer arithmetic.",
          "guidance": [
            "Use .at() in debug builds for bounds-checked access.",
            "Validate all sizes and indices derived from external input before use.",
            "Enable AddressSanitizer in test and CI builds to catch out-of-bounds access."
          ]
        },
        {
          "id": "conc-data-races",
          "category": "Concurrency Safety",
          "title": "Prevent data races in concurrent code",
          "impact": "MEDIUM",
          "summary": "Protect shared mutable state with mutexes, atomics, or lock-free structures. Never access shared data without synchronization.",
          "guidance": [
            "Use std::mutex with std::lock_guard or std::scoped_lock for critical sections.",
            "Prefer std::atomic for simple shared counters and flags.",
            "Run ThreadSanitizer in CI to catch races that are hard to reproduce manually."
          ]
        }
      ]
    },
