        "title": "Reflects the real C/C++ standard, compiler, and build system constraints.",
        "details": [
          "The answer should use the declared language standard, build system, and compiler flags of the repository."
        ]
      },
      {
        "title": "Avoids undefined behavior and memory safety issues.",
        "details": [
          "No use-after-free, buffer overflows, uninitialized reads, data races, or signed integer overflow."
        ]
      },
      {
        "title": "Preserves ABI, header contracts, and public API stability.",
        "details": [
          "Struct layouts, exported symbols, header includes, and function signatures should not drift unintentionally."
        ]
      },
      {
        "title": "Uses RAII, const correctness, and modern idioms where applicable.",
        "details": [
          "C++ code should prefer smart pointers, value semantics, and standard algorithms over manual resource management."
        ]
      },
      {
        "title": "Includes or updates tests and static analysis.",
        "details": [
