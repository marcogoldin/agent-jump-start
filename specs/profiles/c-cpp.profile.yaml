  "workspaceInstructions": {
    "packageManagerRule": "Use the build system already adopted by the repository (CMake, Meson, Bazel, Make). Do not switch build systems without explicit agreement.",
    "runtimeRule": "Target the C and C++ standard versions declared in the project configuration. Do not use compiler extensions or newer standard features unless the project explicitly allows them.",
    "sections": [
      {
        "title": "General rules",
        "rules": [
          "Prefer small, reviewable changes that preserve current behavior unless the task explicitly changes a feature or contract.",
          "Keep code compatible with the project's declared C/C++ standard and supported compilers (GCC, Clang, MSVC as applicable).",
          "Preserve ABI stability, public header contracts, and backwards compatibility unless a breaking change is intentional.",
          "Avoid undefined behavior, implementation-defined behavior, and platform-specific assumptions without explicit guards.",
          "Update build configuration and documentation whenever dependencies, compiler flags, or runtime requirements change."
        ]
      },
      {
        "title": "C/C++ rules",
        "rules": [
          "Prefer RAII, smart pointers, and value semantics over manual memory management in C++ code.",
          "Use const correctness consistently across function signatures, member functions, and variables.",
          "Prefer standard library facilities over hand-rolled equivalents unless there is a measured performance reason.",
          "Keep header files minimal: use forward declarations, avoid including unnecessary headers, and prefer the pimpl idiom for complex implementation details.",
          "Use namespaces (C++) or consistent prefixes (C) to avoid symbol collisions."
        ]
      },
      {
        "title": "Safety rules",
        "rules": [
          "Never use raw owning pointers in C++ when a smart pointer or container is appropriate.",
          "Bounds-check array and buffer access. Prefer std::span, std::array, or range-based iteration over raw pointer arithmetic.",
          "Sanitize all external input before processing. Never trust data from files, network, or user input without validation.",
          "Enable and fix all warnings from -Wall -Wextra -Wpedantic (GCC/Clang) or /W4 (MSVC). Treat warnings as errors in CI.",
          "Run static analysis (clang-tidy, cppcheck) and sanitizers (ASan, UBSan, TSan) as part of the validation pipeline."
        ]
      },
      {
        "title": "Build and dependency rules",
        "rules": [
          "Pin dependency versions and use reproducible builds. Document how to fetch or install third-party libraries.",
          "Keep build configuration (CMakeLists.txt, Makefile, meson.build) clean, well-commented, and modular.",
          "Support both Debug and Release build types with appropriate optimization and debug flags.",
          "Use pkg-config, find_package, or FetchContent for dependency resolution instead of hardcoded paths."
        ]
      },
      {
        "title": "Testing rules",
        "rules": [
          "Use the project's testing framework (Google Test, Catch2, CTest, or plain assert-based tests).",
          "Test edge cases, boundary conditions, and error paths — not just the happy path.",
          "Use sanitizers (AddressSanitizer, UndefinedBehaviorSanitizer) in test builds.",
          "Keep test fixtures minimal and deterministic. Avoid test-order dependencies."
        ]
      }
    ],
    "validation": [
      "Run the project's build command (cmake --build, make, or equivalent).",
      "Run the test suite (ctest, make test, or the project's test runner).",
      "Run static analysis when available (clang-tidy, cppcheck).",
      "Compile with sanitizers enabled for CI (ASan, UBSan at minimum)."
    ]
  },
  "reviewChecklist": {
    "intro": "Checklist for verifying whether a C/C++ proposal follows the repository rules instead of generic textbook advice.",
    "failureThreshold": 2,
    "items": [
